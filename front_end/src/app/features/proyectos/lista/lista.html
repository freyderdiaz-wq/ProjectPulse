<div class="min-h-screen bg-gray-50 p-6">
  <div class="max-w-7xl mx-auto">
    <!-- Header -->
    <div class="mb-8 flex items-start justify-between">
      <div>
        <h1 class="text-3xl font-bold text-gray-900">Proyectos</h1>
        <p class="text-gray-600 mt-2">Gestiona todos tus proyectos</p>
      </div>
      <a routerLink="/proyectos/nuevo" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-semibold whitespace-nowrap">
        + Proyecto
      </a>
    </div>

    <!-- Loading State -->
    <div *ngIf="loading()" class="flex items-center justify-center min-h-[400px]">
      <div class="text-center">
        <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
        <p class="mt-4 text-gray-600 text-lg">Cargando proyectos...</p>
      </div>
    </div>

    <!-- Error State -->
    <div *ngIf="error()" class="p-4 bg-red-50 border-l-4 border-red-500 text-red-700 rounded">
      <p class="font-bold">Error</p>
      <p>{{ error() }}</p>
    </div>

    <!-- Empty State -->
    <div *ngIf="!loading() && !error() && proyectos().length === 0" class="bg-blue-50 border-l-4 border-blue-500 p-6 rounded text-center">
      <p class="text-blue-800 text-lg">No hay proyectos registrados. <a routerLink="/proyectos/nuevo" class="text-blue-600 font-bold hover:underline">Crea uno</a></p>
    </div>

    <!-- Projects Grid -->
    <div *ngIf="!loading() && !error() && proyectos().length > 0" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div *ngFor="let proyecto of proyectos()" class="bg-white rounded-lg shadow hover:shadow-lg transition p-6">
        <div class="flex items-start justify-between mb-4">
          <h3 class="text-xl font-bold text-gray-900">{{ proyecto.nombre }}</h3>
          <div class="w-12 h-12 bg-gradient-to-br from-blue-400 to-blue-600 rounded-full"></div>
        </div>
        <p class="text-gray-600 mb-6">{{ proyecto.descripcion || 'Sin descripción' }}</p>
        <div class="flex gap-2">
          <button (click)="editar(proyecto.id)" class="flex-1 px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 transition font-semibold">
            Editar
          </button>
          <button (click)="eliminar(proyecto.id)" class="flex-1 px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600 transition font-semibold">
            Eliminar
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
