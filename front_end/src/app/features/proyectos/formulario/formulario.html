<div class="min-h-screen bg-gray-50 p-6">
  <div class="max-w-2xl mx-auto">
    <!-- Header -->
    <div class="mb-8">
      <h1 class="text-3xl font-bold text-gray-900">{{ isEditing() ? 'Editar Proyecto' : 'Nuevo Proyecto' }}</h1>
      <p class="text-gray-600 mt-2">{{ isEditing() ? 'Actualiza los detalles del proyecto' : 'Crea un nuevo proyecto para gestionar tus actividades' }}</p>
    </div>

    <!-- Form -->
    <form [formGroup]="form" (ngSubmit)="submit()" novalidate class="bg-white rounded-lg shadow p-8">
      <!-- Error Alert -->
      <div *ngIf="error()" class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 rounded">
        <p class="font-bold">Error</p>
        <p>{{ error() }}</p>
      </div>

      <!-- Success Alert -->
      <div *ngIf="success()" class="mb-6 p-4 bg-green-50 border-l-4 border-green-500 text-green-700 rounded">
        <p class="font-bold">Éxito</p>
        <p>{{ success() }}</p>
      </div>

      <!-- Nombre -->
      <div class="mb-6">
        <label class="block text-sm font-semibold text-gray-700 mb-2">Nombre del Proyecto *</label>
        <input formControlName="nombre" type="text" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition" placeholder="Nombre del proyecto" />
        <p *ngIf="form.get('nombre')?.invalid && form.get('nombre')?.touched" class="mt-1 text-sm text-red-600">Nombre es requerido (máximo 100 caracteres)</p>
      </div>

      <!-- Descripción -->
      <div class="mb-6">
        <label class="block text-sm font-semibold text-gray-700 mb-2">Descripción</label>
        <textarea formControlName="descripcion" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition" placeholder="Describe el proyecto (máximo 255 caracteres)" rows="4"></textarea>
        <p *ngIf="form.get('descripcion')?.invalid && form.get('descripcion')?.touched" class="mt-1 text-sm text-red-600">Máximo 255 caracteres</p>
      </div>

      <!-- Submit Button -->
      <div class="flex gap-4">
        <button type="submit" [disabled]="loading() || form.invalid" class="flex-1 px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-400 transition font-semibold">
          {{ loading() ? 'Guardando...' : (isEditing() ? 'Actualizar Proyecto' : 'Crear Proyecto') }}
        </button>
        <button type="button" (click)="cancel()" class="flex-1 px-6 py-3 bg-gray-300 text-gray-800 rounded-lg hover:bg-gray-400 transition font-semibold">
          Cancelar
        </button>
      </div>
    </form>
  </div>
</div>
